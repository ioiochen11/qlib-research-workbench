region: "cn"
provider_uri: "~/.qlib/qlib_data/cn_data"
download_output: "~/tmp/qlib_bin.tar.gz"
extract_dir: "~/.qlib/qlib_data/cn_data"
uri_folder: "~/.qlibAssistant/mlruns"
pfx_name: "p"
sfx_name: "s"
model_name: "Linear"
dataset_name: "Alpha158"
stock_pool: "csi300"
step: 60
rolling_type: "expanding"
train_window_years: 3
valid_window_months: 6
test_window_months: 1
analysis_folder: "~/.qlibAssistant/analysis"
backup_folder: "~/model_pkl"
model_filter:
  - ".*"
rec_filter:
  - ic: -1.0
  - icir: -1.0
  - rankic: -1.0
  - rankicir: -1.0
asset_url: "https://github.com/chenditc/investment_data/releases/latest/download/qlib_bin.tar.gz"
mirrors:
  - name: gh-proxy
    prefix: "https://gh-proxy.org/"
  - name: direct
    prefix: ""
